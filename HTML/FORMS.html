<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width>, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p>In this form we use the select,option elements and selected attribute of option element of forms</p>
    <form action="FormsActionPage.html" target="_parent" method="get" autocomplete="off">
        <label for="country">Choose a country:</label><br><br>
        <select name="country" id="country" size="3" multiple>
            <option value="usa">United States</option>
            <option value="canada" >Canada</option>
            <option value="mexico">Mexico</option>
            <option value="New Zealand">New Zealand</option>
            <option value="Brazil">Brazil</option>
            <option value="India">India</option>
        </select>
        <br><br>
        <input type="submit" value="Submit">
        
<h2>Textarea</h2>
<p>The textarea element defines a multi-line input field.</p>
<textarea name="message" rows="4" cols="60">
    ICPC stands for International Collegiate Programming Contest. It is a competitive programming competition for university students. The contest is organized by the Association for Computing Machinery (ACM) and is considered one of the most prestigious programming competitions in the world.
</textarea><br><br> 
<input type="submit" value="Submit">
<h2>Button Element</h2>
<button type="button" onclick="alert('Button clicked!')">Click Me!</button>
    </form> 
</body>
</html>
