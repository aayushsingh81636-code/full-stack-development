<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width>, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p>In this form we use the select,option elements and selected attribute of option element of forms</p>
    <form action="FormsActionPage.html" target="_parent" method="get" autocomplete="off">
        <input list="countries">
        <datalist id="countries">
            <label for="country">Choose a country:</label><br><br>
                <option value="usa">United States</option>
                <option value="canada" >Canada</option>
                <option value="mexico">Mexico</option>
            <option value="New Zealand">New Zealand</option>
            <option value="Brazil">Brazil</option>
            <option value="India">India</option>
        <br><br>
        </datalist>
<input type="submit" value="Submit">
    </form> 
</body>
</html>
