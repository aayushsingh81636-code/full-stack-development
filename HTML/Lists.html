<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2> UNORDERED LIST</h2>
    <ul style="list-style-type:square;"><!--lis-style-type give the mark to the list items-->
        <li>India</li><!--List items-->
        <li>United states of America</li>
        <li>New Zealand</li>
    </ul>
    <h2>ORDERED LIST</h2>
    <ol type="I"><!--type is used to give the numbers to the list items-->
        <li>India</li>
        <li>United states of America</li>
        <li>New Zealand</li>
    </ol>
    <h2>DESCRIPTION LIST</h2>
    <dl >
        <dt>India</dt><!--description list term name -->
        <dd>India is a soverign country</dd><!--description about the term-->
        
    </dl>
</body>
</html>
